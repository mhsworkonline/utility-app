<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Downloader</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;
  --surface:#FFFFFF;
  --surface-alt:#F8F7F4;
  --border:#E2E1DC;
  --text-dark:#18181A;
  --text-mid:#4A4A50;
  --text-muted:#8A8A92;
  --brand:#4573D9;
  --brand-light:#EEF2FB;
  --brand-border:#C5D5F5;
  --warn-bg:#FFFBEB;
  --warn-border:#FDE68A;
  --warn-text:#92400E;
  --error-bg:#FEF2F2;
  --error-border:#FECACA;
  --error-text:#991B1B;
  --success:#16A34A;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --shadow-card:0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover:0 4px 16px rgba(0,0,0,0.10);
  --radius-card:16px;
  --radius-btn:8px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text-dark);-webkit-font-smoothing:antialiased;min-height:100vh;padding:2rem 1rem 4rem;}
.page{max-width:640px;margin:0 auto;}

/* Header */
.header{margin-bottom:1.75rem;}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-muted);text-decoration:none;letter-spacing:.03em;margin-bottom:14px;}
.back-link:hover{color:var(--brand);}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.header-title{font-size:22px;font-weight:600;color:var(--text-dark);letter-spacing:-.01em;margin-bottom:4px;}
.header-sub{font-size:14px;color:var(--text-muted);line-height:1.5;}
.platform-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.platform-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);margin-bottom:1rem;overflow:hidden;}
.card-body{padding:1.25rem;}

/* URL input */
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;}
.url-row{display:flex;gap:8px;}
.url-input{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-btn);
  background:var(--surface-alt);font-family:var(--font);font-size:14px;
  color:var(--text-dark);outline:none;transition:border-color .15s,box-shadow .15s;
  min-width:0;
}
.url-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(69,115,217,.1);}
.url-input::placeholder{color:var(--text-muted);}

/* Buttons */
.btn{border:none;border-radius:var(--radius-btn);font-family:var(--font);font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--brand);color:#fff;font-size:14px;padding:10px 18px;}
.btn-primary:not(:disabled):hover{opacity:.88;}
.btn-download{width:100%;font-size:15px;padding:13px;background:var(--brand);color:#fff;}
.btn-download:not(:disabled):hover{opacity:.88;}

/* Error / notice */
.alert{display:none;border-radius:8px;padding:11px 15px;font-size:13px;line-height:1.5;margin-bottom:1rem;}
.alert.show{display:block;}
.alert-error{background:var(--error-bg);border:1px solid var(--error-border);border-left:3px solid #DC2626;color:var(--error-text);}
.alert-warn{background:var(--warn-bg);border:1px solid var(--warn-border);border-left:3px solid #F59E0B;color:var(--warn-text);}

/* Loading spinner */
.loading{display:none;text-align:center;padding:2rem 1rem;color:var(--text-muted);font-size:13px;}
.loading.show{display:flex;align-items:center;justify-content:center;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Info card */
.info-card{display:none;}
.info-card.show{display:block;}

.video-meta{display:flex;gap:14px;padding:1.25rem;border-bottom:1px solid var(--border);}
.video-thumb{width:128px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--surface-alt);display:block;}
.video-thumb-placeholder{width:128px;height:72px;border-radius:8px;flex-shrink:0;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;}
.video-details{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.video-title{font-size:14px;font-weight:600;color:var(--text-dark);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.video-uploader{font-size:12px;color:var(--text-muted);}
.video-duration{font-size:12px;color:var(--text-muted);}

/* Format selector */
.fmt-section{padding:1.25rem;}
.fmt-group{margin-bottom:14px;}
.fmt-group:last-child{margin-bottom:0;}
.fmt-group-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.fmt-options{display:flex;flex-wrap:wrap;gap:8px;}
.fmt-option{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:76px;padding:9px 14px;border:1.5px solid var(--border);
  border-radius:var(--radius-btn);cursor:pointer;background:var(--surface-alt);
  transition:border-color .15s,background .15s;text-align:center;
  user-select:none;
}
.fmt-option:hover:not(.disabled){border-color:var(--brand);background:var(--brand-light);}
.fmt-option.selected{border-color:var(--brand);background:var(--brand-light);}
.fmt-option.disabled{opacity:.38;cursor:not-allowed;}
.fmt-res{font-size:14px;font-weight:700;color:var(--text-dark);line-height:1.2;}
.fmt-size{font-size:11px;color:var(--text-muted);margin-top:2px;}
.fmt-option.selected .fmt-res{color:var(--brand);}
.fmt-option.selected .fmt-size{color:var(--brand);}

/* Download action */
.dl-section{padding:0 1.25rem 1.25rem;}

/* Progress */
.dl-progress{display:none;padding:12px 1.25rem;border-top:1px solid var(--border);}
.dl-progress.show{display:block;}
.progress-msg{font-size:13px;color:var(--text-muted);margin-bottom:7px;}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--brand);border-radius:2px;width:0%;transition:width .35s ease;}

/* Legal notice */
.legal{font-size:11px;color:var(--text-muted);line-height:1.6;padding:10px 1.25rem 1.25rem;border-top:1px solid var(--border);}

/* Responsive */
@media(max-width:480px){
  body{padding:1.25rem .75rem 3rem;}
  .url-row{flex-direction:column;}
  .btn-primary{padding:11px;}
  .video-thumb,.video-thumb-placeholder{width:96px;height:54px;}
  .video-meta{padding:1rem;}
  .fmt-section,.dl-section{padding-left:1rem;padding-right:1rem;}
  .legal{padding-left:1rem;padding-right:1rem;}
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <a class="back-link" href="/">← Back to apps</a>
    <div class="eyebrow">Utility · Media</div>
    <div class="header-title">Video Downloader</div>
    <div class="header-sub">Paste a video URL to download as MP4 or MP3.</div>
    <div class="platform-row">
      <span class="platform-pill">YouTube</span>
      <span class="platform-pill">Instagram</span>
      <span class="platform-pill">Facebook</span>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="field-label">Video URL</div>
      <div class="url-row">
        <input class="url-input" type="url" id="url-input"
          placeholder="https://www.youtube.com/watch?v=…" autocomplete="off" spellcheck="false"/>
        <button class="btn btn-primary" id="btn-fetch" onclick="fetchInfo()">Get Info</button>
      </div>
    </div>
  </div>

  <div class="alert alert-error" id="error-box"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Fetching video info…</span>
  </div>

  <div class="card info-card" id="info-card">
    <div class="video-meta">
      <img class="video-thumb" id="video-thumb" src="" alt="" onerror="this.style.display='none';document.getElementById('thumb-placeholder').style.display='flex'"/>
      <div class="video-thumb-placeholder" id="thumb-placeholder" style="display:none;">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24"><path d="M15 12l-6 4V8l6 4z" fill="#C5C5C8"/><rect x="3" y="5" width="18" height="14" rx="3" stroke="#C5C5C8" stroke-width="1.5"/></svg>
      </div>
      <div class="video-details">
        <div class="video-title" id="video-title"></div>
        <div class="video-uploader" id="video-uploader"></div>
        <div class="video-duration" id="video-duration"></div>
      </div>
    </div>

    <div class="fmt-section">
      <div class="fmt-group">
        <div class="fmt-group-label">Audio</div>
        <div class="fmt-options" id="fmt-audio"></div>
      </div>
      <div class="fmt-group">
        <div class="fmt-group-label">Video (MP4)</div>
        <div class="fmt-options" id="fmt-video"></div>
      </div>
    </div>

    <div class="dl-section">
      <button class="btn btn-download" id="btn-download" disabled onclick="startDownload()">
        Select a format above
      </button>
    </div>

    <div class="dl-progress" id="dl-progress">
      <div class="progress-msg" id="progress-msg">Preparing download…</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="legal">
      For personal use only. Respect copyright and the platform's Terms of Service.
    </div>
  </div>

</div>
<script>
let videoInfo = null;
let selectedFmt = null;
let progressTick = null;

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});

async function fetchInfo() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  setLoading(true);
  hideError();
  document.getElementById('info-card').classList.remove('show');
  selectedFmt = null;

  try {
    const res = await fetch('/api/video-info', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to fetch info');
    videoInfo = data;
    renderInfo(data);
  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function fmt2Dur(sec) {
  if (!sec) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function renderInfo(data) {
  const thumb = document.getElementById('video-thumb');
  const placeholder = document.getElementById('thumb-placeholder');
  if (data.thumbnail) {
    thumb.src = data.thumbnail;
    thumb.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    thumb.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  document.getElementById('video-title').textContent = data.title || 'Untitled';
  document.getElementById('video-uploader').textContent = data.uploader ? data.uploader : '';
  document.getElementById('video-duration').textContent = data.duration ? fmt2Dur(data.duration) : '';

  // Audio option
  const a = data.audio;
  document.getElementById('fmt-audio').innerHTML = `
    <div class="fmt-option${a.oversized ? ' disabled' : ''}" onclick="${a.oversized ? '' : "selectFmt(this,'mp3')"}" data-fmt="mp3">
      <div class="fmt-res">MP3</div>
      <div class="fmt-size">${a.oversized ? '> 100 MB' : a.sizeLabel}</div>
    </div>`;

  // Video options
  document.getElementById('fmt-video').innerHTML = (data.formats || []).map(f => `
    <div class="fmt-option${f.oversized ? ' disabled' : ''}" onclick="${f.oversized ? '' : `selectFmt(this,'${f.height}')`}" data-fmt="${f.height}">
      <div class="fmt-res">${f.label}</div>
      <div class="fmt-size">${f.oversized ? '> 100 MB' : f.sizeLabel}</div>
    </div>`).join('');

  selectedFmt = null;
  const btn = document.getElementById('btn-download');
  btn.disabled = true;
  btn.textContent = 'Select a format above';
  document.getElementById('dl-progress').classList.remove('show');
  document.getElementById('info-card').classList.add('show');
}

function selectFmt(el, fmt) {
  document.querySelectorAll('.fmt-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedFmt = fmt;
  const label = fmt === 'mp3' ? 'MP3' : `${fmt}p MP4`;
  const btn = document.getElementById('btn-download');
  btn.disabled = false;
  btn.textContent = `Download ${label}`;
}

async function startDownload() {
  if (!selectedFmt || !videoInfo) return;
  const url = document.getElementById('url-input').value.trim();

  const btn = document.getElementById('btn-download');
  btn.disabled = true;
  hideError();

  const prog = document.getElementById('dl-progress');
  const fill = document.getElementById('progress-fill');
  const msg = document.getElementById('progress-msg');
  prog.classList.add('show');
  fill.style.width = '0%';
  msg.textContent = 'Preparing download…';

  let pct = 0;
  progressTick = setInterval(() => {
    pct = Math.min(pct + (pct < 25 ? 4 : pct < 60 ? 1.5 : pct < 85 ? 0.5 : 0.1), 90);
    fill.style.width = pct + '%';
  }, 500);

  try {
    // Step 1: POST tells server to download to a temp file, returns a key
    const res = await fetch('/api/video-download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url, format: selectedFmt, title: videoInfo.title })
    });

    clearInterval(progressTick);

    if (!res.ok) {
      let errMsg = 'Download failed';
      try { const err = await res.json(); errMsg = err.error || errMsg; } catch {}
      throw new Error(errMsg);
    }

    const { key, filename } = await res.json();

    fill.style.width = '100%';
    msg.textContent = 'Download starting…';

    // Step 2: navigate directly to serve endpoint — browser keeps this page open
    // because Content-Disposition: attachment is returned, no blob/iframe tricks needed
    const params = new URLSearchParams({ k: key, fn: filename });
    window.location.href = '/api/video-serve?' + params.toString();

    setTimeout(() => {
      prog.classList.remove('show');
      btn.disabled = false;
    }, 2000);

  } catch(e) {
    clearInterval(progressTick);
    prog.classList.remove('show');
    btn.disabled = false;
    // Scroll error into view since it's above the card
    const errEl = document.getElementById('error-box');
    errEl.textContent = e.message;
    errEl.classList.add('show');
    errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('btn-fetch').disabled = on;
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function hideError() {
  document.getElementById('error-box').classList.remove('show');
}
</script>
</body>
</html>
