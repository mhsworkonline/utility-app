<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>App Store Lookup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;--surface:#FFFFFF;--surface-alt:#F8F7F4;--border:#E2E1DC;
  --text-dark:#18181A;--text-mid:#4A4A50;--text-muted:#8A8A92;
  --brand:#4573D9;--brand-light:#EEF2FB;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --shadow-card:0 1px 4px rgba(0,0,0,0.06);--radius:16px;--radius-sm:8px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text-dark);-webkit-font-smoothing:antialiased;min-height:100vh;padding:2rem 1rem 4rem;}
.page{max-width:680px;margin:0 auto;}

/* Header */
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-muted);text-decoration:none;letter-spacing:.03em;margin-bottom:14px;}
.back-link:hover{color:var(--brand);}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.header-title{font-size:22px;font-weight:600;color:var(--text-dark);letter-spacing:-.01em;margin-bottom:4px;}
.header-sub{font-size:14px;color:var(--text-muted);margin-bottom:1.5rem;}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-card);margin-bottom:1rem;overflow:hidden;}

/* Search */
.input-body{padding:1.25rem;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;}
.search-row{display:flex;gap:8px;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-alt);font-family:var(--font);font-size:14px;color:var(--text-dark);outline:none;transition:border-color .15s,box-shadow .15s;min-width:0;}
.search-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(69,115,217,.1);}
.search-input::placeholder{color:var(--text-muted);}
.btn{border:none;border-radius:var(--radius-sm);font-family:var(--font);font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--brand);color:#fff;font-size:14px;padding:10px 20px;}
.btn-primary:not(:disabled):hover{opacity:.88;}

/* History */
.history-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:10px;margin-top:10px;border-top:1px solid var(--border);}
.history-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-right:2px;}
.history-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface-alt);font-size:12px;color:var(--text-mid);cursor:pointer;font-family:var(--font);transition:background .12s,border-color .12s,color .12s;}
.history-chip:hover{background:var(--brand-light);border-color:var(--brand);color:var(--brand);}
.chip-x{font-size:13px;line-height:1;opacity:.45;margin-left:2px;padding:0 2px;}
.chip-x:hover{opacity:1;}

/* Section head */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}

/* Developer cards */
.dev-card{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.dev-card:last-child{border-bottom:none;}
.dev-name{font-size:15px;font-weight:600;color:var(--text-dark);margin-bottom:5px;}
.dev-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.badge-ios{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;}
.badge-android{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.badge-count{background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border);}
.btn-view{font-size:13px;font-weight:600;color:var(--brand);background:none;border:1px solid var(--brand);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:background .15s;}
.btn-view:hover{background:var(--brand-light);}

/* Tab bar */
.tab-bar{display:flex;gap:3px;padding:.65rem .9rem;border-bottom:1px solid var(--border);background:var(--surface-alt);}
.tab{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);background:none;cursor:pointer;transition:background .12s,color .12s;}
.tab:hover{background:var(--border);color:var(--text-mid);}
.tab.active{background:var(--brand);color:#fff;font-weight:600;}
.tab-n{font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.25);color:inherit;line-height:1.5;}
.tab:not(.active) .tab-n{background:var(--border);color:var(--text-muted);}

/* Stats bar */
.stats-bar{display:flex;gap:1.5rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-muted);}
.stats-bar b{color:var(--text-dark);}

/* App entry wrapper */
.app-entry{border-bottom:1px solid var(--border);}
.app-entry:last-child{border-bottom:none;}

/* App row — compact */
.app-row{display:flex;align-items:center;gap:12px;padding:.85rem 1.25rem;cursor:pointer;transition:background .12s;user-select:none;}
.app-row:hover{background:var(--surface-alt);}
.app-row--fresh{background:#F0FDF4;border-left:3px solid #16A34A;}
.app-row--fresh:hover{background:#E7FAF0;}
.app-row--fresh .app-name{color:#15803D;}
.app-icon{width:44px;height:44px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid var(--border);}
.app-icon-fb{width:44px;height:44px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;}
.app-info{flex:1;min-width:0;}
.app-name{font-size:14px;font-weight:600;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.app-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.meta-star{font-size:11px;font-weight:700;color:#D97706;}
.meta-installs{font-size:11px;color:var(--text-muted);}
.meta-free{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.meta-paid{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}
.meta-age{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border);}
.meta-sep{font-size:10px;color:var(--border);}
.app-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.store-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;text-decoration:none;white-space:nowrap;transition:opacity .12s;}
.store-badge:hover{opacity:.8;}
.store-badge-ios{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;}
.store-badge-android{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;transition:transform .2s;}

/* Detail panel */
.app-detail{border-top:1px solid var(--border);background:var(--surface-alt);display:none;}
.detail-platform{padding:1rem 1.25rem;}
.detail-platform+.detail-platform{border-top:1px solid var(--border);}
.detail-platform-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.detail-plat-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
.detail-store-link{font-size:12px;font-weight:600;color:var(--brand);text-decoration:none;}
.detail-store-link:hover{text-decoration:underline;}
.detail-table{width:100%;border-collapse:collapse;}
.detail-table tr+tr td{border-top:1px solid var(--border);}
.dt-label{font-size:12px;color:var(--text-muted);padding:5px 0;width:100px;vertical-align:top;}
.dt-value{font-size:12px;color:var(--text-dark);padding:5px 0;font-weight:500;}
.dt-star{color:#D97706;font-weight:700;}
.detail-desc{font-size:12px;color:var(--text-mid);margin-top:.75rem;line-height:1.6;font-style:italic;}

/* Freshness */
.search-app-row--fresh{background:#F0FDF4;border-left:3px solid #16A34A;}
.search-app-row--fresh .search-app-name{color:#15803D;}

/* Back btn */
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;margin-bottom:10px;}
.back-btn:hover{color:var(--brand);}

/* Sort */
.sort-select{font-size:12px;color:var(--text-mid);border:1px solid var(--border);border-radius:6px;padding:4px 8px;background:var(--surface);font-family:var(--font);cursor:pointer;outline:none;appearance:none;padding-right:22px;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A8A92' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 7px center;}
.sort-select:focus{border-color:var(--brand);}

/* Spinner / states */
.spinner-wrap{padding:2.5rem;display:flex;justify-content:center;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-msg{padding:2.5rem 1.25rem;text-align:center;color:var(--text-muted);font-size:14px;}
.state-msg.error{color:#DC2626;}

/* Search result rows */
.results-section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);padding:.8rem 1.25rem .5rem;border-top:1px solid var(--border);}
.results-section-label:first-child{border-top:none;}
.search-app-row{display:flex;align-items:center;gap:10px;padding:.7rem 1.25rem;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background .12s;}
.search-app-row:last-child{border-bottom:none;}
.search-app-row:hover{background:var(--surface-alt);}
.search-app-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;object-fit:cover;border:1px solid var(--border);}
.search-app-icon-fb{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.search-app-info{flex:1;min-width:0;}
.search-app-name{font-size:13px;font-weight:600;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-app-dev{font-size:11px;color:var(--text-muted);margin-top:1px;}
.search-app-badges{display:flex;gap:4px;flex-shrink:0;}

/* Responsive */
@media(max-width:480px){
  .dev-card{flex-direction:column;align-items:flex-start;}
  .btn-view{width:100%;}
  .app-actions{gap:4px;}
  .store-badge{padding:3px 7px;}
  .tab-bar{gap:2px;}
  .tab{padding:4px 9px;font-size:12px;}
  .dt-label{width:80px;}
}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back-link">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
    Home
  </a>

  <div class="header">
    <div class="eyebrow">Utility · Research</div>
    <div class="header-title">App Store Lookup</div>
    <div class="header-sub">Find all iOS and Android apps published by a company.</div>
  </div>

  <!-- Search card -->
  <div class="card">
    <div class="input-body">
      <div class="field-label">Company or App Name</div>
      <div class="search-row">
        <input id="search-input" class="search-input" type="text" placeholder="e.g. Meta, Spotify, Facebook…" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="btn btn-primary" id="btn-search" onclick="doSearch()">Search</button>
      </div>
      <div id="history-row" class="history-row" style="display:none;"></div>
    </div>
  </div>

  <!-- Developer results -->
  <div id="section-devs" style="display:none;">
    <div class="card">
      <div class="section-head">
        <span class="section-title" id="devs-heading">Matching Developers</span>
      </div>
      <div id="devs-body"></div>
    </div>
  </div>

  <!-- App list -->
  <div id="section-apps" style="display:none;">
    <button class="back-btn" onclick="showDevs()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
      Back to results
    </button>
    <div class="card">
      <div class="section-head">
        <span class="section-title" id="apps-heading"></span>
        <select class="sort-select" id="sort-select" style="display:none;" onchange="setSort(this.value)">
          <option value="date">Last Updated</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="tab-bar" id="tab-bar">
        <button class="tab active" id="tab-all"     onclick="setTab('all')">All <span class="tab-n" id="tn-all">0</span></button>
        <button class="tab"        id="tab-ios"     onclick="setTab('ios')"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="opacity:.8"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.78-2.54 3.99M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> iOS <span class="tab-n" id="tn-ios">0</span></button>
        <button class="tab"        id="tab-android" onclick="setTab('android')"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="opacity:.8"><path d="M17.523 15.341a1 1 0 1 1-2 0 1 1 0 0 1 2 0m-9 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0M2.003 8h19.994A1 1 0 0 1 23 9.003v6.994A1 1 0 0 1 21.997 17H2.003A1 1 0 0 1 1 15.997V9.003A1 1 0 0 1 2.003 8M8.5 2.5l-1.5 3h10l-1.5-3z"/></svg> Android <span class="tab-n" id="tn-android">0</span></button>
      </div>
      <div id="apps-body"></div>
    </div>
  </div>
</div>

<script>
const HISTORY_KEY = 'app-lookup-history';
const MAX_HISTORY = 5;
let lastDevResults = [];
let currentApps    = [];
let activeTab      = 'all';
let sortBy         = 'date';

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return isNaN(d.getTime()) ? '—' : d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

function fmtNum(n){
  if(!n) return '';
  if(n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1e3) return Math.round(n/1e3)+'K';
  return String(n);
}

function isRecent(iso){ if(!iso) return false; return (Date.now()-new Date(iso).getTime()) < 7*24*60*60*1000; }

const ICON_COLORS=['#4573D9','#16A34A','#D97706','#7C3AED','#DC2626','#0284C7','#DB2777'];
function iconColor(n){ let h=0; for(const c of n) h=(h*31+c.charCodeAt(0))&0xffff; return ICON_COLORS[h%ICON_COLORS.length]; }

// ── History ───────────────────────────────────────────────────────────────────
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); }catch{ return []; } }

function saveHistory(dev){
  let h = loadHistory().filter(x => x.name !== dev.name);
  h.unshift({ name: dev.name, iosArtistId: dev.iosArtistId, androidDevId: dev.androidDevId });
  if(h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function removeHistory(name, e){
  e.stopPropagation();
  const h = loadHistory().filter(x => x.name !== name);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  const h = loadHistory();
  const row = document.getElementById('history-row');
  if(!h.length){ row.style.display='none'; return; }
  row.style.display='flex';
  row.innerHTML = `<span class="history-lbl">Recent</span>` +
    h.map(d => `
      <span class="history-chip" onclick="fetchFromHistory(${JSON.stringify(d).replace(/"/g,'&quot;')})">
        ${esc(d.name)}
        <span class="chip-x" onclick="removeHistory(${JSON.stringify(d.name).replace(/"/g,'&quot;')},event)">×</span>
      </span>`).join('');
}

function fetchFromHistory(dev){
  document.getElementById('search-input').value = dev.name;
  fetchApps(dev);
}

// ── Search ───────────────────────────────────────────────────────────────────
async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  const btn = document.getElementById('btn-search');
  btn.disabled=true; btn.textContent='Searching…';
  document.getElementById('section-apps').style.display='none';
  document.getElementById('section-devs').style.display='block';
  document.getElementById('devs-body').innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
  document.getElementById('devs-heading').textContent='Matching Developers';
  try {
    const res  = await fetch(`/api/app-search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Search failed.');
    lastDevResults = data.developers||[];
    renderSearchResults(lastDevResults, data.apps||[], q);
  } catch(e){
    document.getElementById('devs-body').innerHTML=`<div class="state-msg error">${esc(e.message)}</div>`;
  }
  btn.disabled=false; btn.textContent='Search';
}

function renderSearchResults(devs, apps, q){
  const total = devs.length + apps.length;
  document.getElementById('devs-heading').textContent = total ? `Results for "${q}"` : '';
  if(!total){
    document.getElementById('devs-body').innerHTML=`<div class="state-msg">No results for "<b>${esc(q)}</b>".</div>`;
    return;
  }
  let html='';
  if(devs.length){
    html+=`<div class="results-section-label">Developers (${devs.length})</div>`;
    html+=devs.map(d=>`
      <div class="dev-card">
        <div>
          <div class="dev-name">${esc(d.name)}</div>
          <div class="dev-badges">
            ${d.iosCount?`<span class="badge badge-ios">iOS</span><span class="badge badge-count">${d.iosCount} app${d.iosCount!==1?'s':''}</span>`:''}
            ${d.androidCount?`<span class="badge badge-android">Android</span><span class="badge badge-count">${d.androidCount} app${d.androidCount!==1?'s':''}</span>`:''}
          </div>
        </div>
        <button class="btn-view" onclick='fetchApps(${JSON.stringify(d)})'>View Apps →</button>
      </div>`).join('');
  }
  if(apps.length){
    html+=`<div class="results-section-label">Apps (${apps.length})</div>`;
    html+=apps.map(app=>{
      const color=iconColor(app.name), initial=(app.name||'?')[0].toUpperCase();
      const iconHtml=app.icon
        ?`<img class="search-app-icon" src="${esc(app.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="search-app-icon-fb" style="background:${color};display:none;">${esc(initial)}</div>`
        :`<div class="search-app-icon-fb" style="background:${color};">${esc(initial)}</div>`;
      const primaryUrl=app.ios?.url||app.android?.url||'#';
      const fresh=isRecent(app.ios?.releaseDate||app.android?.releaseDate||'');
      return `
        <a class="search-app-row${fresh?' search-app-row--fresh':''}" href="${esc(primaryUrl)}" target="_blank" rel="noopener">
          ${iconHtml}
          <div class="search-app-info">
            <div class="search-app-name">${esc(app.name)}</div>
            <div class="search-app-dev">${esc(app.developer)}</div>
          </div>
          <div class="search-app-badges">
            ${app.ios?`<span class="badge badge-ios">iOS</span>`:''}
            ${app.android?`<span class="badge badge-android">Android</span>`:''}
          </div>
        </a>`;
    }).join('');
  }
  document.getElementById('devs-body').innerHTML=html;
}

function showDevs(){
  document.getElementById('section-apps').style.display='none';
  document.getElementById('section-devs').style.display='block';
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function setTab(t){
  activeTab=t;
  ['all','ios','android'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===t));
  renderAppRows();
}

// ── App Fetch ────────────────────────────────────────────────────────────────
async function fetchApps(dev){
  saveHistory(dev);
  document.getElementById('section-devs').style.display='none';
  document.getElementById('section-apps').style.display='block';
  document.getElementById('apps-heading').textContent=dev.name;
  document.getElementById('apps-body').innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
  activeTab='all'; sortBy='date';
  ['all','ios','android'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id==='all'));
  const ss=document.getElementById('sort-select'); ss.value='date'; ss.style.display='';
  const p=new URLSearchParams({devName:dev.name});
  if(dev.iosArtistId)  p.set('iosId', dev.iosArtistId);
  if(dev.androidDevId) p.set('androidId', dev.androidDevId);
  try {
    const res  = await fetch(`/api/app-fetch?${p}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Failed to load apps.');
    currentApps=data.apps||[];
    updateTabCounts();
    renderAppRows();
  } catch(e){
    document.getElementById('apps-body').innerHTML=`<div class="state-msg error">${esc(e.message)}</div>`;
  }
}

function setSort(val){ sortBy=val; renderAppRows(); }

function applySort(apps, tab){
  if(sortBy==='name') return [...apps].sort((a,b)=>a.name.localeCompare(b.name));
  return [...apps].sort((a,b)=>{
    const d=app=>{
      if(tab==='ios')     return app.ios?.releaseDate     ? new Date(app.ios.releaseDate).getTime()     : 0;
      if(tab==='android') return app.android?.releaseDate ? new Date(app.android.releaseDate).getTime() : 0;
      return Math.max(
        app.ios?.releaseDate     ? new Date(app.ios.releaseDate).getTime()     : 0,
        app.android?.releaseDate ? new Date(app.android.releaseDate).getTime() : 0
      );
    };
    return d(b)-d(a);
  });
}

function updateTabCounts(){
  document.getElementById('tn-all').textContent     = currentApps.length;
  document.getElementById('tn-ios').textContent     = currentApps.filter(a=>a.ios).length;
  document.getElementById('tn-android').textContent = currentApps.filter(a=>a.android).length;
}

// ── Expand / Detail ───────────────────────────────────────────────────────────
function toggleExpand(idx, e){
  e.stopPropagation();
  const detail  = document.getElementById('app-detail-'+idx);
  const chevron = document.getElementById('app-chev-'+idx);
  if(!detail) return;
  const open = detail.style.display==='block';
  detail.style.display = open ? 'none' : 'block';
  if(chevron) chevron.style.transform = open ? '' : 'rotate(180deg)';
}

function platformDetailHtml(data, platform){
  if(!data) return '';
  const ratingHtml = data.rating
    ? `<span class="dt-star">★ ${data.rating.toFixed(1)}</span>${data.ratingCount ? ` <span style="color:var(--text-muted)">(${fmtNum(data.ratingCount)} ratings)</span>` : ''}`
    : '—';
  const rows = [
    ['Rating', ratingHtml],
    ...(platform==='Android' && data.installs ? [['Installs', esc(data.installs)]] : []),
    ['Version', esc(data.version||'—')],
    ['Updated', esc(fmtDate(data.releaseDate))],
    ...(data.size ? [['Size', esc(data.size)]] : []),
    ['Price', data.free ? 'Free' : (data.price ? `$${data.price.toFixed(2)}` : '—')],
    ...(data.category  ? [['Category',   esc(data.category)]]  : []),
    ...(data.ageRating ? [['Age Rating', esc(data.ageRating)]] : []),
  ];
  return `
    <div class="detail-platform">
      <div class="detail-platform-head">
        <span class="detail-plat-label">${platform}</span>
        ${data.url ? `<a class="detail-store-link" href="${esc(data.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View in store →</a>` : ''}
      </div>
      <table class="detail-table">
        ${rows.map(([l,v])=>`<tr><td class="dt-label">${l}</td><td class="dt-value">${v}</td></tr>`).join('')}
      </table>
      ${data.description ? `<p class="detail-desc">${esc(data.description)}${data.description.length>=200?'…':''}</p>` : ''}
    </div>`;
}

// ── Render App Rows ───────────────────────────────────────────────────────────
function renderAppRows(){
  const tab=activeTab;
  const filtered=applySort(
    tab==='ios'     ? currentApps.filter(a=>a.ios)
    : tab==='android' ? currentApps.filter(a=>a.android)
    : currentApps,
    tab
  );

  if(!filtered.length){
    document.getElementById('apps-body').innerHTML='<div class="state-msg">No apps on this platform.</div>';
    return;
  }

  document.getElementById('apps-body').innerHTML = filtered.map((app, idx) => {
    const showIos     = tab!=='android' && app.ios;
    const showAndroid = tab!=='ios'     && app.android;

    // Pick date for freshness based on active tab
    const date = (showIos ? app.ios?.releaseDate : null) ?? (showAndroid ? app.android?.releaseDate : null) ?? '';
    const fresh = isRecent(date);

    // Rating: prefer platform matching tab, fallback to whatever is available
    const ratingData = (tab==='ios' ? app.ios : tab==='android' ? app.android : null) ?? app.ios ?? app.android;
    const rating     = ratingData?.rating;
    const installs   = tab!=='ios' ? app.android?.installs : null;
    const freeVal    = (tab==='ios' ? app.ios?.free : tab==='android' ? app.android?.free : (app.ios?.free ?? app.android?.free));
    const ageRating  = (tab==='ios' ? app.ios?.ageRating : tab==='android' ? app.android?.ageRating : (app.ios?.ageRating ?? app.android?.ageRating));

    // Icon
    const color=iconColor(app.name), initial=(app.name||'?')[0].toUpperCase();
    const iconHtml=app.icon
      ?`<img class="app-icon" src="${esc(app.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="app-icon-fb" style="background:${color};display:none;">${esc(initial)}</div>`
      :`<div class="app-icon-fb" style="background:${color};">${esc(initial)}</div>`;

    // Meta line
    const metaParts=[];
    if(rating)    metaParts.push(`<span class="meta-star">★ ${rating.toFixed(1)}</span>`);
    if(installs)  metaParts.push(`<span class="meta-installs">${esc(installs)}</span>`);
    if(freeVal!==undefined) metaParts.push(freeVal ? `<span class="meta-free">FREE</span>` : `<span class="meta-paid">PAID</span>`);
    if(ageRating) metaParts.push(`<span class="meta-age">${esc(ageRating)}</span>`);
    const metaHtml = metaParts.join('<span class="meta-sep">·</span>');

    // Store badges
    const iosBadge     = app.ios     && tab!=='android' ? `<a class="store-badge store-badge-ios"     href="${esc(app.ios.url)}"     target="_blank" rel="noopener" onclick="event.stopPropagation()">iOS</a>`     : '';
    const androidBadge = app.android && tab!=='ios'     ? `<a class="store-badge store-badge-android" href="${esc(app.android.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Android</a>` : '';

    // Detail panel: show platforms matching tab
    const detailHtml =
      (showIos     ? platformDetailHtml(app.ios,     'iOS')     : '') +
      (showAndroid ? platformDetailHtml(app.android, 'Android') : '');

    return `
      <div class="app-entry">
        <div class="app-row${fresh?' app-row--fresh':''}" onclick="toggleExpand(${idx},event)">
          ${iconHtml}
          <div class="app-info">
            <div class="app-name" title="${esc(app.name)}">${esc(app.name)}</div>
            ${metaHtml ? `<div class="app-meta">${metaHtml}</div>` : ''}
          </div>
          <div class="app-actions">
            ${iosBadge}${androidBadge}
            <span class="chevron" id="app-chev-${idx}">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
            </span>
          </div>
        </div>
        <div class="app-detail" id="app-detail-${idx}">${detailHtml}</div>
      </div>`;
  }).join('');
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderHistory();
</script>
</body>
</html>
